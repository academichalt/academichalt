# Academic Halt — Decap CMS Configuration
# Docs: https://decapcms.org/docs/configuration-options/

backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/academic-halt   # ← Replace with your GitHub username/repo
  branch: main
  commit_messages:
    create: "Add book: {{slug}}"
    update: "Update book: {{slug}}"
    delete: "Delete book: {{slug}}"
    uploadMedia: "Upload media: {{path}}"
    deleteMedia: "Delete media: {{path}}"

# Enable local backend for development (run: npx decap-server)
# local_backend: true

media_folder: "assets/book-covers"
public_folder: "/assets/book-covers"

# ──────────────────────────────────────────────────────────────
# COLLECTIONS
# ──────────────────────────────────────────────────────────────
collections:

  # ── BOOKS ────────────────────────────────────────────────────
  - name: "books"
    label: "Books"
    label_singular: "Book"
    folder: "content/books"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{category}}"
    sortable_fields: ["title", "category", "subject"]
    view_filters:
      - label: "Class 9"
        field: category
        pattern: "class-9"
      - label: "Class 10"
        field: category
        pattern: "class-10"
      - label: "Class 11"
        field: category
        pattern: "class-11"
      - label: "Class 12"
        field: category
        pattern: "class-12"
      - label: "JEE Main"
        field: category
        pattern: "jee-main"
      - label: "JEE Advanced"
        field: category
        pattern: "jee-advanced"
      - label: "NEET"
        field: category
        pattern: "neet"
      - label: "UPSC"
        field: category
        pattern: "upsc"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Full book title e.g. NCERT Mathematics Class 10"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL-friendly version e.g. ncert-mathematics-class-10 (no spaces, lowercase)"
        pattern: ['^[a-z0-9-]+$', "Must be lowercase letters, numbers, and hyphens only"]

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Class 9",       value: "class-9" }
          - { label: "Class 10",      value: "class-10" }
          - { label: "Class 11",      value: "class-11" }
          - { label: "Class 12",      value: "class-12" }
          - { label: "JEE Main",      value: "jee-main" }
          - { label: "JEE Advanced",  value: "jee-advanced" }
          - { label: "NEET",          value: "neet" }
          - { label: "UPSC",          value: "upsc" }
        hint: "Select the exam/class category for this book"

      - label: "Subject"
        name: "subject"
        widget: "select"
        options:
          - "Mathematics"
          - "Physics"
          - "Chemistry"
          - "Biology"
          - "Science"
          - "Social Science"
          - "English"
          - "Hindi"
          - "History"
          - "Geography"
          - "Political Science / Polity"
          - "Economics"
          - "Accountancy"
          - "Business Studies"
          - "Physics + Chemistry + Maths"
          - "Biology + Physics + Chemistry"
          - "General Studies"
          - "Current Affairs"
          - "Art and Culture"
          - "Other"
        hint: "Primary subject of the book"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Short description (2-3 sentences) shown on book cards. Max 300 characters."

      - label: "PDF Link"
        name: "pdf_link"
        widget: "string"
        hint: "Direct URL to the PDF file or download page"
        required: true

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        allow_multiple: false
        hint: "Upload a book cover image (JPG or PNG, recommended 3:4 aspect ratio)"
        media_library:
          config:
            multiple: false

      - label: "Featured Book"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show this book in the 'Popular Books' section on the homepage"

      - label: "Emoji Icon"
        name: "emoji"
        widget: "string"
        required: false
        default: "📚"
        hint: "Emoji shown when no cover image is available (e.g. 📐 for Maths, ⚛️ for Physics)"

      - label: "Full Book Description (for book detail page)"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Optional longer description shown on the individual book page"

  # ── BLOG POSTS ───────────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["title", "date"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL slug e.g. best-books-for-jee-main"
        pattern: ['^[a-z0-9-]+$', "Lowercase, numbers and hyphens only"]

      - label: "Meta Description"
        name: "description"
        widget: "text"
        hint: "SEO meta description (140-160 characters)"

      - label: "Author"
        name: "author"
        widget: "string"
        default: "Academic Halt Editorial Team"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Category Tag"
        name: "tag"
        widget: "select"
        options:
          - "JEE Main"
          - "JEE Advanced"
          - "NEET"
          - "UPSC"
          - "Board Exams"
          - "Class 9"
          - "Class 10"
          - "Class 11"
          - "Class 12"
          - "Study Tips"
          - "Book Reviews"

      - label: "Content"
        name: "body"
        widget: "markdown"
        hint: "Write the full article content here (minimum 1000 words recommended)"
