backend:
  name: github
  repo: academichalt/academichalt
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev

site_url: https://www.academichalt.com
display_url: https://www.academichalt.com
logo_url: https://www.academichalt.com/assets/logo.svg

media_folder: assets/book-covers
public_folder: /assets/book-covers

collections:
  - name: books
    label: Books
    label_singular: Book
    folder: content/books
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - label: Category
        name: category
        widget: select
        options:
          - { label: Class 9, value: class-9 }
          - { label: Class 10, value: class-10 }
          - { label: Class 11, value: class-11 }
          - { label: Class 12, value: class-12 }
          - { label: JEE Main, value: jee-main }
          - { label: JEE Advanced, value: jee-advanced }
          - { label: NEET, value: neet }
          - { label: UPSC, value: upsc }
      - { label: Subject, name: subject, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: PDF Link, name: pdf_link, widget: string }
      - { label: Cover Image, name: cover_image, widget: image, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Publish Date, name: date, widget: datetime }

  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Author, name: author, widget: string, default: Academic Halt Team }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Meta Description, name: description, widget: text }
      - { label: Cover Image, name: cover_image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
