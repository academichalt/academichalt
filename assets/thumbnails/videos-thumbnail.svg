<svg viewBox="0 0 280 157" xmlns="http://www.w3.org/2000/svg" width="280" height="157">
  <defs>
    <linearGradient id="bg-videos" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fee2e2;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="157" fill="url(#bg-videos)" rx="8"/>

  <!-- Pattern overlay -->
  <circle cx="240" cy="20" r="60" fill="#dc2626" opacity="0.06"/>
  <circle cx="20" cy="140" r="50" fill="#dc2626" opacity="0.05"/>

  <!-- Top bar -->
  <rect width="280" height="4" fill="#dc2626" rx="0" opacity="0.8"/>

  <!-- Icon circle -->
  <circle cx="34" cy="38" r="20" fill="#dc2626" opacity="0.15"/>
  <g transform="translate(22,26) scale(1)" color="#dc2626">
    <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" stroke="currentColor" stroke-width="2" fill="currentColor"/></svg>
  </g>

  <!-- Category pill -->
  <rect x="62" y="28" width="54" height="20" rx="10" fill="#dc2626" opacity="0.15"/>
  <text x="89" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#b91c1c" letter-spacing="0.3">VIDEOS</text>

  <!-- Title -->
  <text x="14" y="138" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Videos - Free Download</text>

  <!-- Divider -->
  <line x1="14" y1="162" x2="266" y2="162" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Subject + Exam tags -->
  <rect x="14" y="170" width="94" height="16" rx="8" fill="#dc2626" opacity="0.12"/>
  <text x="61" y="182" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="600" fill="#b91c1c">All Subjects</text>

  <rect x="116" y="170" width="70" height="16" rx="8" fill="#dc2626" opacity="0.08"/>
  <text x="151" y="182" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="600" fill="#b91c1c" opacity="0.8">All Exams</text>

  <!-- Footer brand -->
  <text x="14" y="150" font-family="Inter,Arial,sans-serif" font-size="9" fill="#94a3b8" font-weight="500">Academic Halt • Free Study Materials</text>
  <text x="266" y="150" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="9" fill="#dc2626" font-weight="700">PDF</text>
